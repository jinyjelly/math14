<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인수분해 기초 챌린지</title>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        body { margin: 0; padding: 20px; background-color: #f1f8e9; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        #GAME_BOX { font-family: 'Malgun Gothic', sans-serif; text-align: center; background-color: #ffffff; padding: 20px; border-radius: 20px; border: 4px solid #4caf50; width: 100%; max-width: 420px; box-sizing: border-box; min-height: 620px; position: relative; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .scr { display: none; }
        .scr.on { display: block; }
        #t-bar-box { width: 100%; height: 12px; background: #dcedc8; border-radius: 6px; margin-bottom: 15px; overflow: hidden; border: 1px solid #4caf50; }
        #t-bar-inner { width: 100%; height: 100%; background: linear-gradient(90deg, #8bc34a, #4caf50); transition: width 0.1s linear; }
        .st-bar { display: flex; justify-content: space-around; font-weight: bold; margin-bottom: 15px; color: #2e7d32; font-size: 1.1rem; }
        
        /* 라텍스 수식 전용 스타일 */
        .pr { font-size: 2.2rem; margin: 25px 0; min-height: 120px; display: flex; align-items: center; justify-content: center; color: #1b5e20; }
        
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .opt-btn { font-size: 1.2rem; padding: 15px 5px; background: #fff; border: 2px solid #4caf50; border-radius: 12px; cursor: pointer; font-weight: bold; color: #2e7d32; transition: 0.2s; min-height: 70px; display: flex; align-items: center; justify-content: center; }
        
        #fb-msg { margin-top:15px; font-weight:bold; min-height: 4.5em; font-size: 1.2rem; line-height: 1.6; display: flex; align-items: center; justify-content: center; border: 2px dashed #4caf50; border-radius: 10px; background: #f9fbf9; padding: 10px; }
        .start-btn { font-size: 1.8rem; padding: 15px 40px; background: #4caf50; color: white; border: none; border-radius: 15px; cursor: pointer; font-weight: bold; margin-top: 40px; }
        .re-btn { font-size: 1.2rem; padding: 15px; background: #2e7d32; color: white; border: none; border-radius: 10px; cursor: pointer; width: 100%; margin-top: 20px; }
    </style>
</head>
<body>
<div id="GAME_BOX">
    <audio id="bgm" loop preload="auto" src="bgm.mp3"></audio>

    <div id="S_START" class="scr on">
        <h2 style="color:#2e7d32; margin-top: 40px;">🧪 인수분해 기초 챌린지</h2>
        <p style="color:gray; line-height:1.6;">라텍스 수식으로 더 깔끔하게!<br><span style="color:#d32f2f; font-weight:bold;">※ 오답 시 점수가 감점됩니다.</span></p>
        <button id="GO_BTN" class="start-btn">시작하기!</button>
    </div>

    <div id="S_QUIZ" class="scr">
        <div id="t-bar-box"><div id="t-bar-inner"></div></div>
        <div class="st-bar">
            <div>점수: <span id="SCORE_VAL">0</span></div>
            <div>시간: <span id="TIME_VAL">60</span>초</div>
        </div>
        <div id="P_TXT" class="pr"></div>
        <div id="O_BOX" class="btn-grid"></div>
        <div id="fb-msg">정답을 고르세요!</div>
    </div>

    <div id="S_RES" class="scr">
        <h2 style="color:#2e7d32;">🏁 결과 확인</h2>
        <p style="font-size: 2rem; margin: 10px 0;">최종 점수: <span id="FINAL_SCORE" style="color:red;">0</span>점</p>
        <button id="RE_BTN" class="re-btn">다시 도전하기</button>
    </div>
</div>

<script>
(function() {
    var ans = "", score = 0, timeLeft = 60, timer = null, isPaused = false;
    const bgm = document.getElementById('bgm');

    // 유형1: 인수분해 (라텍스 표기)
    const type1 = [
        { q: "\\(x^2 + 4x + 4\\)", a: "\\((x+2)^2\\)" },
        { q: "\\(x^2 - 10x + 25\\)", a: "\\((x-5)^2\\)" },
        { q: "\\(x^2 - 1\\)", a: "\\((x+1)(x-1)\\)" },
        { q: "\\(x^2 - 49\\)", a: "\\((x+7)(x-7)\\)" },
        { q: "\\(x^2 + 8x + 16\\)", a: "\\((x+4)^2\\)" },
        { q: "\\(x^2 - 100\\)", a: "\\((x+10)(x-10)\\)" }
    ];

    // 유형2: 상수항 k 구하기 (숫자만!)
    const type2 = [
        { q: "\\(x^2 + 6x + k\\) 가<br>완전제곱식이면 k?", a: "9" },
        { q: "\\(x^2 - 12x + k\\) 가<br>완전제곱식이면 k?", a: "36" },
        { q: "\\(x^2 + 16x + k\\) 가<br>완전제곱식이면 k?", a: "64" },
        { q: "\\(x^2 - 20x + k\\) 가<br>완전제곱식이면 k?", a: "100" },
        { q: "\\(x^2 + 2x + k\\) 가<br>완전제곱식이면 k?", a: "1" },
        { q: "\\(x^2 - 14x + k\\) 가<br>완전제곱식이면 k?", a: "49" }
    ];

    function init() {
        document.getElementById('S_START').classList.remove('on');
        document.getElementById('S_RES').classList.remove('on');
        document.getElementById('S_QUIZ').classList.add('on');
        score = 0; timeLeft = 60; isPaused = false;
        bgm.volume = 0.3; bgm.play().catch(e => {});
        updateUI(); make();
        if(timer) clearInterval(timer);
        timer = setInterval(function() {
            if(!isPaused) {
                timeLeft--; updateUI();
                if(timeLeft <= 0) endGame();
            }
        }, 1000);
    }

    function updateUI() {
        document.getElementById('SCORE_VAL').innerText = score;
        document.getElementById('TIME_VAL').innerText = timeLeft;
        document.getElementById('t-bar-inner').style.width = (timeLeft / 60 * 100) + "%";
    }

    function make() {
        isPaused = false;
        document.getElementById('fb-msg').innerHTML = "정답을 고르세요!";
        document.getElementById('fb-msg').style.backgroundColor = "#f9fbf9";
        
        const typeIdx = Math.floor(Math.random() * 2);
        const currentPool = (typeIdx === 0) ? type1 : type2;
        const item = currentPool[Math.floor(Math.random() * currentPool.length)];
        
        document.getElementById('P_TXT').innerHTML = item.q;
        ans = item.a;
        
        let os = [ans];
        while(os.length < 4) {
            let w = currentPool[Math.floor(Math.random() * currentPool.length)].a;
            if(os.indexOf(w) === -1) os.push(w);
        }
        os.sort(() => Math.random() - 0.5);

        const box = document.getElementById('O_BOX'); box.innerHTML = "";
        os.forEach(v => {
            const btn = document.createElement('button');
            btn.className = 'opt-btn'; btn.innerHTML = v;
            btn.onclick = () => { if(!isPaused) check(v); };
            box.appendChild(btn);
        });

        // ★ MathJax에게 수식을 다시 그리라고 명령 (중요!)
        if (window.MathJax) {
            MathJax.typesetPromise();
        }
    }

    function check(v) {
        const fb = document.getElementById('fb-msg');
        if(v === ans) {
            isPaused = true; score += 100;
            fb.innerHTML = "<span style='color:blue;'>정답! +100 ✨</span>";
            fb.style.backgroundColor = "#e8f5e9";
            setTimeout(() => { make(); }, 800); 
        } else {
            score = Math.max(0, score - 100);
            fb.innerHTML = "<span style='color:red;'>오답! -100💀<br>정답: " + ans + "</span>";
            fb.style.backgroundColor = "#ffebee";
            const btns = document.querySelectorAll('.opt-btn');
            btns.forEach(b => b.style.opacity = "0.5");
            if (window.MathJax) MathJax.typesetPromise();
            setTimeout(() => { make(); }, 2000); 
        }
        updateUI();
    }

    function endGame() {
        clearInterval(timer); bgm.pause();
        document.getElementById('S_QUIZ').classList.remove('on');
        document.getElementById('S_RES').classList.add('on');
        document.getElementById('FINAL_SCORE').innerText = score;
    }

    document.getElementById('GO_BTN').onclick = init;
    document.getElementById('RE_BTN').onclick = init;
})();
</script>
</body>
</html>
