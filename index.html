<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인수분해 무한 챌린지</title>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 20px; background-color: #f1f8e9; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Nanum Gothic', sans-serif; }
        #GAME_BOX { background-color: #ffffff; padding: 30px 20px; border-radius: 25px; border: 5px solid #4caf50; width: 100%; max-width: 440px; box-sizing: border-box; min-height: 640px; position: relative; box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
        .scr { display: none; }
        .scr.on { display: block; }
        #t-bar-box { width: 100%; height: 14px; background: #dcedc8; border-radius: 10px; margin-bottom: 20px; overflow: hidden; border: 1.5px solid #4caf50; }
        #t-bar-inner { width: 100%; height: 100%; background: linear-gradient(90deg, #8bc34a, #4caf50); transition: width 0.1s linear; }
        .st-bar { display: flex; justify-content: space-around; font-weight: bold; margin-bottom: 20px; color: #2e7d32; font-size: 1.15rem; }
        .pr { font-size: 2.1rem; margin: 30px 0; min-height: 140px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #1b5e20; line-height: 1.8; }
        .pr b { color: #2e7d32; font-size: 1.2rem; margin-top: 10px; font-weight: 700; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .opt-btn { font-size: 1.25rem; padding: 15px 5px; background: #fff; border: 2.5px solid #4caf50; border-radius: 15px; cursor: pointer; font-weight: bold; color: #2e7d32; transition: all 0.2s; min-height: 75px; display: flex; align-items: center; justify-content: center; }
        #fb-msg { margin-top:20px; font-weight:bold; min-height: 5em; font-size: 1.15rem; line-height: 1.6; display: flex; align-items: center; justify-content: center; border: 2px dashed #4caf50; border-radius: 15px; background: #f9fbf9; padding: 10px; }
        .start-btn { font-size: 1.8rem; padding: 15px 45px; background: #4caf50; color: white; border: none; border-radius: 20px; cursor: pointer; font-weight: bold; margin-top: 50px; box-shadow: 0 4px 0 #388e3c; }
        .re-btn { font-size: 1.25rem; padding: 15px; background: #2e7d32; color: white; border: none; border-radius: 12px; cursor: pointer; width: 100%; margin-top: 25px; }
    </style>
</head>
<body>
<div id="GAME_BOX">
    <audio id="bgm" loop preload="auto" src="bgm.mp3"></audio>
    <div id="S_START" class="scr on">
        <h1 style="color:#2e7d32; margin-top: 30px; font-size: 2.2rem;">🧪 인수분해 무한생성</h1>
        <p style="color:#666; line-height:1.7; font-size: 1.1rem;">
            문제가 계속 바뀝니다! 외워서 풀 수 없어요.<br>
            <span style="color:#d32f2f; font-weight:bold;">오답 시 점수가 차감됩니다.</span>
        </p>
        <button id="GO_BTN" class="start-btn">도전 시작!</button>
    </div>
    <div id="S_QUIZ" class="scr">
        <div id="t-bar-box"><div id="t-bar-inner"></div></div>
        <div class="st-bar">
            <div>Score: <span id="SCORE_VAL">0</span></div>
            <div>Time: <span id="TIME_VAL">60</span>s</div>
        </div>
        <div id="P_TXT" class="pr"></div>
        <div id="O_BOX" class="btn-grid"></div>
        <div id="fb-msg">준비...</div>
    </div>
    <div id="S_RES" class="scr">
        <h2 style="color:#2e7d32; font-size: 2rem;">🏁 미션 종료</h2>
        <p style="font-size: 2.2rem; margin: 20px 0;">최종 점수: <span id="FINAL_SCORE" style="color:#d32f2f;">0</span>점</p>
        <button id="RE_BTN" class="re-btn">기록 경신하기</button>
    </div>
</div>

<script>
(function() {
    var ans = "", score = 0, timeLeft = 60, timer = null, isPaused = false;
    const bgm = document.getElementById('bgm');

    function init() {
        document.getElementById('S_START').classList.remove('on');
        document.getElementById('S_RES').classList.remove('on');
        document.getElementById('S_QUIZ').classList.add('on');
        score = 0; timeLeft = 60; isPaused = false;
        bgm.volume = 0.3; bgm.play().catch(e => {});
        updateUI(); make();
        if(timer) clearInterval(timer);
        timer = setInterval(function() {
            if(!isPaused) {
                timeLeft--; updateUI();
                if(timeLeft <= 0) endGame();
            }
        }, 1000);
    }

    function updateUI() {
        document.getElementById('SCORE_VAL').innerText = score;
        document.getElementById('TIME_VAL').innerText = timeLeft;
        document.getElementById('t-bar-inner').style.width = (timeLeft / 60 * 100) + "%";
    }

    function generateProblem() {
        const type = Math.floor(Math.random() * 3); // 0: 완전제곱식, 1: 합차, 2: k구하기
        let q = "", a = "", options = [];

        if (type === 0) { // 완전제곱식
            let n = Math.floor(Math.random() * 12) + 1;
            const sign = Math.random() < 0.5 ? 1 : -1;
            const middle = 2 * n * sign;
            const last = n * n;
            const signChar = sign === 1 ? "+" : "-";
            q = `\\(x^2 ${middle > 0 ? "+" : ""}${middle}x + ${last}\\)<b>를 인수분해하면?</b>`;
            a = `\\((x ${signChar} ${n})^2\\)`;
            for(let i=0; i<4; i++) {
                let ranN = Math.floor(Math.random() * 15) + 1;
                let ranS = Math.random() < 0.5 ? "+" : "-";
                options.push(`\\((x ${ranS} ${ranN})^2\\)`);
            }
        } else if (type === 1) { // 합차 공식
            let n = Math.floor(Math.random() * 12) + 1;
            q = `\\(x^2 - ${n*n}\\) <b>을 인수분해하면?</b>`;
            a = `\\((x+${n})(x-${n})\\)`;
            for(let i=0; i<4; i++) {
                let ranN = Math.floor(Math.random() * 15) + 1;
                options.push(`\\((x+${ranN})(x-${ranN})\\)`);
            }
        } else { // 상수항 k 구하기
            let n = Math.floor(Math.random() * 12) + 1;
            const sign = Math.random() < 0.5 ? 1 : -1;
            const middle = 2 * n * sign;
            q = `\\(x^2 ${middle > 0 ? "+" : ""}${middle}x + k\\) <b>완전제곱식이면 \\(k\\)는?</b>`;
            a = (n * n).toString();
            for(let i=0; i<4; i++) {
                options.push((Math.pow(Math.floor(Math.random() * 15) + 1, 2)).toString());
            }
        }
        
        // 정답을 옵션에 넣고 중복 제거 및 섞기
        options[0] = a;
        let uniqueOpts = [...new Set(options)];
        while(uniqueOpts.length < 4) {
            uniqueOpts.push(type === 2 ? (Math.floor(Math.random() * 200)).toString() : `\\((x+${Math.floor(Math.random()*20)})^2\\)`);
            uniqueOpts = [...new Set(uniqueOpts)];
        }
        uniqueOpts.sort(() => Math.random() - 0.5);
        
        return { q, a, opts: uniqueOpts };
    }

    function make() {
        isPaused = false;
        const msg = document.getElementById('fb-msg');
        msg.innerHTML = "문제를 보고 정답을 터치하세요!";
        msg.style.backgroundColor = "#f9fbf9";
        
        const prob = generateProblem();
        document.getElementById('P_TXT').innerHTML = prob.q;
        ans = prob.a;
        
        const box = document.getElementById('O_BOX'); box.innerHTML = "";
        prob.opts.forEach(v => {
            const btn = document.createElement('button');
            btn.className = 'opt-btn'; btn.innerHTML = v;
            btn.onclick = () => { if(!isPaused) check(v); };
            box.appendChild(btn);
        });

        if (window.MathJax) MathJax.typesetPromise();
    }

    function check(v) {
        const fb = document.getElementById('fb-msg');
        if(v === ans) {
            isPaused = true; score += 100;
            fb.innerHTML = "<span style='color:blue;'>천재시군요! 정답입니다 ✨</span>";
            fb.style.backgroundColor = "#e8f5e9";
            setTimeout(() => { make(); }, 800); 
        } else {
            score = Math.max(0, score - 100);
            fb.innerHTML = "<span style='color:red;'>오답입니다! -100💀<br>정답: " + ans + "</span>";
            fb.style.backgroundColor = "#ffebee";
            const btns = document.querySelectorAll('.opt-btn');
            btns.forEach(b => b.style.opacity = "0.5");
            if (window.MathJax) MathJax.typesetPromise();
            setTimeout(() => { make(); }, 2000); 
        }
        updateUI();
    }

    function endGame() {
        clearInterval(timer); bgm.pause();
        document.getElementById('S_QUIZ').classList.remove('on');
        document.getElementById('S_RES').classList.add('on');
        document.getElementById('FINAL_SCORE').innerText = score;
    }

    document.getElementById('GO_BTN').onclick = init;
    document.getElementById('RE_BTN').onclick = init;
})();
</script>
</body>
</html>
